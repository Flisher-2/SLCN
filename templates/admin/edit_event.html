{% extends "admin/base_admin.html" %}
{% block title %}Edit Event – Admin{% endblock %}
{% block page_title %}Edit Event{% endblock %}
{% block body %}
<div class="panel">
  <div class="panel-header">
    <h3><i class="fa fa-calendar-edit"></i> Edit: {{ event.title }}</h3>
    <a href="/admin/events" class="btn btn-sm btn-outline"><i class="fa fa-arrow-left"></i> Back</a>
  </div>
  <form method="POST" action="/admin/events/edit/{{ event.id }}">
    <div class="form-grid">
      <div class="form-group full">
        <label>Event Title *</label>
        <input type="text" name="title" value="{{ event.title }}" required/>
      </div>
      <div class="form-group">
        <label>Event Date *</label>
        <input type="date" name="event_date" value="{{ event.event_date.strftime('%Y-%m-%d') }}" required/>
      </div>
      <div class="form-group">
        <label>Event Time</label>
        <input type="time" name="event_time" value="{{ event.event_time }}"/>
      </div>
      <div class="form-group full">
        <label>Location</label>
        <input type="text" name="location" value="{{ event.location }}"/>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea name="description" rows="4">{{ event.description }}</textarea>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save Changes</button>
      <a href="/admin/events" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
