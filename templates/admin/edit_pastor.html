{% extends "admin/base_admin.html" %}
{% block title %}Edit Pastor – Admin{% endblock %}
{% block page_title %}Edit Pastor{% endblock %}
{% block body %}
<div class="panel">
  <div class="panel-header">
    <h3><i class="fa fa-user-edit"></i> Edit: {{ pastor.name }}</h3>
    <a href="/admin/pastors" class="btn btn-sm btn-outline"><i class="fa fa-arrow-left"></i> Back</a>
  </div>
  <form method="POST" action="/admin/pastors/edit/{{ pastor.id }}" enctype="multipart/form-data">
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" value="{{ pastor.name }}" required/>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ pastor.title }}"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" value="{{ pastor.phone }}"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ pastor.email }}"/>
      </div>
      <div class="form-group">
        <label>Display Order</label>
        <input type="number" name="order_num" value="{{ pastor.order_num }}"/>
      </div>
      <div class="form-group">
        <label>New Photo (leave empty to keep current)</label>
        {% if pastor.photo %}
        <div style="margin-bottom:10px;"><img src="/static/{{ pastor.photo }}" style="height:100px;border-radius:10px;object-fit:cover;"/></div>
        {% endif %}
        <div class="file-upload-wrap">
          <div class="file-upload-area">
            <i class="fa fa-camera"></i>
            <p>Click to upload new photo</p>
            <input type="file" name="photo" accept="image/*" data-preview="editPhotoPreview"/>
          </div>
        </div>
        <div id="editPhotoPreview" class="preview-grid"></div>
      </div>
      <div class="form-group full">
        <label>Biography</label>
        <textarea name="bio" rows="5">{{ pastor.bio }}</textarea>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;gap:12px;">
      <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save Changes</button>
      <a href="/admin/pastors" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
