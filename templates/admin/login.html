<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0f0e17 0%,#1e1b4b 50%,#4c1d95 100%);}
    .login-card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:50px 40px;width:100%;max-width:420px;text-align:center;}
    .church-icon{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#a855f7);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:2.2rem;color:#fff;margin:0 auto 20px;}
    h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#fff;margin-bottom:6px;}
    p.sub{color:rgba(255,255,255,.5);font-size:.9rem;margin-bottom:32px;}
    .form-group{text-align:left;margin-bottom:18px;}
    label{display:block;color:rgba(255,255,255,.7);font-size:.85rem;margin-bottom:6px;font-weight:500;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);}
    input{width:100%;padding:13px 14px 13px 42px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:.95rem;
      transition:border-color .2s,background .2s;}
    input:focus{outline:none;border-color:#7c3aed;background:rgba(255,255,255,.12);}
    input::placeholder{color:rgba(255,255,255,.3);}
    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;
      transition:all .25s;margin-top:8px;box-shadow:0 4px 20px rgba(124,58,237,.4);}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.5);}
    .flash{padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:.88rem;text-align:left;}
    .flash-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.4);
      font-size:.85rem;text-decoration:none;margin-top:20px;transition:color .2s;}
    .back-link:hover{color:#fff;}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="church-icon"><i class="fa fa-church"></i></div>
    <h1>Admin Panel</h1>
    <p class="sub">Sign in to manage your church website</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}"><i class="fa fa-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/admin">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fa fa-user"></i>
          <input type="text" name="username" placeholder="Enter username" required autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa fa-lock"></i>
          <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="fa fa-sign-in-alt"></i> Sign In</button>
    </form>
    <a href="/" class="back-link"><i class="fa fa-arrow-left"></i> Back to Website</a>
  </div>
</body>
</html>
